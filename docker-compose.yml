services:
  postgres:
    image: postgres:15-alpine
    container_name: zamapay-postgres
    environment:
      POSTGRES_DB: zamapay
      POSTGRES_USER: zamapay
      POSTGRES_PASSWORD: zamapay
    ports:
      - "5432:5432"
    volumes:
      - zamapay-postgres-data:/var/lib/postgresql/data
      - ./scripts/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zamapay -d zamapay"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  zamapay-postgres-data:
