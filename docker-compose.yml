services:
  postgres:
    image: postgres:15-alpine
    container_name: mermer-postgres
    environment:
      POSTGRES_DB: mermer
      POSTGRES_USER: mermer
      POSTGRES_PASSWORD: mermer
    ports:
      - "5432:5432"
    volumes:
      - mermer-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mermer -d mermer"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mermer-postgres-data:
